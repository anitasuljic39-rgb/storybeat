<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>StoryBeat — Crée sa chanson (fond clair)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:ital,wght@0,400;0,500;0,600;0,700;0,800;1,600;1,700;1,800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser/dist/email.min.js"></script>
<style>
  :root{
    /* Couleurs de marque StoryBeat */
    --pink:#ff3aa8;
    --violet:#9b4dff;
    --cyan:#1fd6ff;
    --grad3:linear-gradient(90deg,#ff3aa8 0%,#9b4dff 50%,#1fd6ff 100%);

    --bg-deep:#fdf7fb;
    --bg-card:#ffffff;
    --bg-card-hover:#fff0f8;
    --line:#f0dfec;
    --text:#1c1420;
    --text-muted:#7a6d80;
    --text-faint:#b3a6ba;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;height:100%;
    background:var(--bg-deep);
    color:var(--text);
    font-family:'Manrope',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  body{
    background-image:
      radial-gradient(circle at 10% 0%, rgba(255,58,168,0.10), transparent 42%),
      radial-gradient(circle at 92% 100%, rgba(31,214,255,0.10), transparent 48%),
      radial-gradient(circle at 95% 6%, rgba(155,77,255,0.08), transparent 40%);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    overflow-x:hidden;
  }
  .app{
    max-width:480px;
    margin:0 auto;
    width:100%;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    padding:28px 22px 22px;
    position:relative;
  }

  .brand{
    font-family:'Sora',sans-serif;
    font-weight:800;
    font-style:italic;
    font-size:20px;
    letter-spacing:.5px;
    margin-bottom:18px;
    color:#2a1c28;
  }
  .brand .b{
    background:var(--grad3);
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }

  .topbar{display:flex;align-items:center;gap:12px;margin-bottom:8px;}
  .cat-tag{
    display:flex;align-items:center;gap:8px;
    font-size:12.5px;letter-spacing:0.14em;text-transform:uppercase;
    color:var(--text-muted);font-weight:700;
  }
  .cat-dot{
    width:7px;height:7px;border-radius:50%;background:var(--pink);
    box-shadow:0 0 0 4px rgba(255,58,168,0.13);
  }
  .trace{margin-left:auto;display:flex;gap:5px;}
  .trace i{
    width:14px;height:4px;border-radius:3px;background:var(--line);
    transition:background .4s ease, width .4s ease;
  }
  .trace i.done{background:var(--grad3);}
  .trace i.now{background:var(--text); width:22px;}

  .waveform{
    display:flex;align-items:flex-end;gap:3px;height:34px;
    margin:6px 0 30px;padding:0 1px;
  }
  .waveform span{
    flex:1;background:var(--line);border-radius:3px;min-height:4px;
    transition:background .6s ease, height .5s cubic-bezier(.34,1.56,.64,1);
  }
  .waveform span.on{background:linear-gradient(180deg,var(--cyan),var(--violet) 55%,var(--pink));}

  .stage{flex:1;display:flex;flex-direction:column;justify-content:flex-start;}
  .q-wrap{animation:rise .45s cubic-bezier(.19,1,.22,1);}
  @keyframes rise{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
  .q-eyebrow{
    font-family:'Manrope',sans-serif;font-size:12.5px;font-weight:700;
    letter-spacing:0.12em;text-transform:uppercase;color:var(--pink);margin-bottom:10px;
  }
  h1.q-title{
    font-family:'Sora',sans-serif;font-weight:700;font-size:29px;
    line-height:1.28;letter-spacing:-0.015em;margin:0 0 10px;color:#1c1420;
  }
  h1.q-title em{
    font-style:italic;font-weight:800;
    background:var(--grad3);-webkit-background-clip:text;background-clip:text;color:transparent;
    display:inline-block;padding:0 0.08em;line-height:1.35;
  }
  .q-sub{color:var(--text-muted);font-size:15px;line-height:1.5;margin:0 0 26px;max-width:36ch;}

  .field{
    width:100%;background:var(--bg-card);border:1px solid var(--line);
    border-radius:16px;padding:16px 18px;color:var(--text);
    font-family:'Manrope',sans-serif;font-size:16px;line-height:1.5;
    resize:none;outline:none;
    box-shadow:0 2px 10px -6px rgba(155,77,255,0.15);
    transition:border-color .2s ease, background .2s ease;
  }
  .field::placeholder{color:var(--text-faint);}
  .field:focus{border-color:var(--pink); background:var(--bg-card-hover);}

  .hint{font-size:13px;color:var(--text-faint);margin-top:9px;}

  .chips{display:flex;flex-wrap:wrap;gap:10px;margin-top:4px;}
  .chip{
    display:inline-flex;align-items:center;gap:8px;padding:13px 18px;
    background:var(--bg-card);border:1px solid var(--line);border-radius:100px;
    color:var(--text);font-size:15px;font-weight:600;cursor:pointer;user-select:none;
    box-shadow:0 2px 8px -6px rgba(155,77,255,0.2);
    transition:transform .15s ease, border-color .15s ease, background .15s ease;
    -webkit-tap-highlight-color:transparent;
  }
  .chip:active{transform:scale(0.96);}
  .chip:hover{border-color:var(--violet);}
  .chip.sel{
    background:linear-gradient(90deg, rgba(255,58,168,0.12), rgba(31,214,255,0.10));
    border-color:var(--pink);color:#1c1420;
  }
  .chip .ic{font-size:17px;line-height:1;}

  .chips-secondary{margin-top:22px;}
  .chips-secondary .label{
    font-size:12.5px;color:var(--text-faint);text-transform:uppercase;
    letter-spacing:.1em;font-weight:700;margin-bottom:12px;
  }

  .more-btn{
    display:inline-flex;align-items:center;gap:6px;margin-top:12px;
    padding:11px 16px;border-radius:100px;border:1px dashed var(--line);
    background:transparent;color:var(--text-muted);font-size:14px;font-weight:700;cursor:pointer;
    transition:border-color .15s ease, color .15s ease;
  }
  .more-btn:hover{border-color:var(--pink); color:var(--text);}
  .more-btn .spin{display:inline-block;transition:transform .3s ease;font-size:13px;}
  .more-btn.open .spin{transform:rotate(180deg);}
  .also-field{margin-top:20px;}

  .controls{display:flex;align-items:center;gap:12px;margin-top:34px;padding-top:8px;}
  .btn-back{
    width:52px;height:52px;border-radius:50%;border:1px solid var(--line);
    background:var(--bg-card);color:var(--text-muted);
    display:flex;align-items:center;justify-content:center;font-size:18px;
    cursor:pointer;flex-shrink:0;transition:opacity .2s ease;
  }
  .btn-back:disabled{opacity:0.3; cursor:default;}
  .btn-next{
    flex:1;height:52px;border-radius:100px;border:none;background:var(--grad3);
    color:#fff;font-family:'Manrope',sans-serif;font-weight:800;font-size:16px;
    letter-spacing:0.01em;cursor:pointer;
    text-shadow:0 0 8px rgba(255,255,255,.45);
    box-shadow:0 10px 24px -10px rgba(255,58,168,0.5);
    transition:transform .15s ease, opacity .2s ease;
  }
  .btn-next:active{transform:scale(0.98);}
  .btn-next:disabled{opacity:0.35; cursor:default;}
  .skip-link{
    text-align:center;color:var(--text-faint);font-size:13.5px;margin-top:16px;
    cursor:pointer;text-decoration:underline;text-underline-offset:3px;
  }

  .recap{animation:rise .5s cubic-bezier(.19,1,.22,1);}
  .recap-icon{font-size:40px;margin-bottom:18px;}
  .recap-card{
    background:var(--bg-card);border:1px solid var(--line);border-radius:20px;
    padding:6px 20px;margin-top:18px;
    box-shadow:0 12px 30px -16px rgba(155,77,255,0.3);
  }
  .recap-row{
    display:flex;justify-content:space-between;gap:16px;
    padding:16px 0;border-bottom:1px solid var(--line);
  }
  .recap-row:last-child{border-bottom:none;}
  .recap-k{color:var(--text-muted); font-size:14px; flex-shrink:0;}
  .recap-v{font-weight:700; text-align:right; font-size:14.5px;}

  /* Capture e-mail (écran final) */
  .final-actions{margin-top:22px;}
  .qlabel{display:block;font-size:13px;font-weight:700;color:var(--text-muted);margin:16px 0 8px;}
  .qlabel:first-child{margin-top:0;}
  .req{color:var(--pink);}
  .formerr{color:#e0398a;font-size:14px;font-weight:600;margin-top:14px;min-height:18px;}
  .formerr:empty{display:none;}
  .final-actions .field{margin-bottom:2px;}
  .final-actions .field + .qlabel{margin-top:14px;}
  .field[type="email"]{margin-top:8px;}

  /* Écran de prix (après envoi) */
  .plans{display:flex;flex-direction:column;gap:16px;margin-top:24px;text-align:left;}
  .plan{position:relative;display:flex;flex-direction:column;background:var(--bg-card);border:1.5px solid var(--line);border-radius:16px;padding:22px 18px;box-shadow:0 2px 10px -6px rgba(155,77,255,0.15);}
  .plan.featured{border-color:var(--pink);box-shadow:0 8px 30px rgba(255,58,168,.16);}
  .plan-badge{position:absolute;top:-11px;left:50%;transform:translateX(-50%);white-space:nowrap;background:var(--grad3);color:#fff;font-family:'Manrope',sans-serif;font-weight:700;font-size:11.5px;letter-spacing:.3px;padding:5px 12px;border-radius:99px;}
  .plan-name{font-family:'Sora',sans-serif;font-weight:700;font-size:14px;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);}
  .plan-price{font-family:'Sora',sans-serif;font-weight:800;font-size:30px;line-height:1;margin:8px 0 16px;background:var(--grad3);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .plan ul{list-style:none;margin:0 0 18px;padding:0;display:flex;flex-direction:column;gap:9px;}
  .plan li{position:relative;padding-left:24px;font-size:14px;color:var(--text);line-height:1.4;}
  .plan li::before{content:'✓';position:absolute;left:0;color:var(--pink);font-weight:800;}
  .btn-pay{margin-top:auto;display:block;text-align:center;background:var(--grad3);color:#fff;font-family:'Manrope',sans-serif;font-weight:800;font-size:15px;text-decoration:none;padding:14px;border-radius:100px;box-shadow:0 10px 24px -10px rgba(255,58,168,0.5);}
  .btn-pay:active{transform:scale(0.98);}

  ::selection{background:rgba(255,58,168,0.20);}
</style>
</head>
<body>

<div class="app">

  <div class="brand">STORY<span class="b">BEAT</span></div>

  <div class="topbar" id="topbar">
    <div class="cat-tag"><span class="cat-dot"></span><span id="catLabel">Ta chanson</span></div>
    <div class="trace" id="trace"></div>
  </div>

  <div class="waveform" id="waveform"></div>

  <div class="stage" id="stage"></div>

</div>

<script>
const state = { answers:{}, linkType:null, index:0 };
function linkIs(...types){ return () => types.includes(state.linkType); }

// ===== EmailJS (envoi des réponses du questionnaire) =====
const EMAILJS_PUBLIC_KEY='u6MuSGT1tR3q8I1pb';
const EMAILJS_SERVICE_ID='service_ehijilk';
const EMAILJS_TEMPLATE_ID='template_hrisr2w';
if(window.emailjs)emailjs.init({publicKey:EMAILJS_PUBLIC_KEY});
function isValidEmail(v){return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);}
function showFormError(m){const e=document.getElementById('formerr');if(e)e.textContent=m||'';}

// Libellé de catégorie affiché en haut
const catLabels = {
  couple:'Amour', enfant:'Mon enfant', parent:'Mère / Père',
  fratrie:'Frère / Sœur', grandparent:'Grands-parents', ami:'Amitié', autre:'Ma chanson'
};

const steps = [

  /* ---------- QUESTION COMMUNE : POUR QUI ---------- */
  { key:'link', eyebrow:'Pour commencer',
    title:'Cette chanson, elle est <em>pour qui</em> ?',
    sub:'On adapte les questions suivantes à la personne que tu veux toucher.',
    type:'chips-single',
    options:[
      {v:'couple', ic:'💞', label:'Mon/Ma partenaire'},
      {v:'enfant', ic:'👶', label:'Mon enfant'},
      {v:'parent', ic:'🤍', label:'Ma mère / Mon père'},
      {v:'fratrie', ic:'🤝', label:'Mon frère / Ma sœur'},
      {v:'grandparent', ic:'🧓', label:'Mes grands-parents'},
      {v:'ami', ic:'✨', label:'Un(e) ami(e)'},
    ]
  },

  /* ============================================================
     PARCOURS 1 — AMOUR / PARTENAIRE  (linkType = couple)
  ============================================================ */
  { key:'nom', eyebrow:'On plante le décor',
    title:'Comment on <em>l\'appelle</em> dans la chanson ?',
    sub:'Son prénom — ou ce petit surnom que toi seul(e) utilises. C\'est encore mieux.',
    type:'text', placeholder:'Ex : Choup, Sarah, Doudou...', onlyIf:linkIs('couple') },
  { key:'duree', eyebrow:'On plante le décor',
    title:'Vous êtes ensemble <em>depuis quand</em> ?', sub:'',
    type:'chips-single', onlyIf:linkIs('couple'),
    options:[
      {v:'debut', label:'Le tout début'},
      {v:'annees', label:'Quelques années'},
      {v:'vie', label:'Toute une vie'},
      {v:'demande', label:'Une demande spéciale'},
      {v:'epreuve', label:'On s\'est retrouvés après une épreuve'},
    ] },
  { key:'enfants', eyebrow:'On plante le décor',
    title:'Tu veux que vos <em>enfants</em> aient une place dans la chanson ?', sub:'',
    type:'chips-single', onlyIf:linkIs('couple'),
    options:[
      {v:'oui', label:'Oui, j\'aimerais qu\'on les cite'},
      {v:'non', label:'Non, cette chanson est pour nous deux'},
    ] },
  { key:'enfants_details', eyebrow:'Ça change tout à l\'écoute',
    title:'Parle-moi <em>d\'eux</em>.',
    sub:'Leurs prénoms, et si tu veux, une date ou un petit souvenir qui les rend uniques. Plus tu m\'en dis, plus ils vivront dans la chanson.',
    type:'text', placeholder:'Ex : Emina (née le 12 mars) et Sami — Emina chante déjà tout le temps',
    onlyIf:()=> state.linkType==='couple' && state.answers.enfants==='oui' },
  { key:'souvenir', eyebrow:'Le cœur de la chanson',
    title:'Un souvenir qui vous <em>appartient</em>, à vous deux.',
    sub:'Le plus précis possible : un lieu, un objet, une phrase qu\'elle/il dit... c\'est ce genre de détail qui fait mouche. Raconte comme à un pote.',
    type:'text-with-chips',
    placeholder:'Ex : le soir où on a parlé jusqu\'à 4h sans voir le temps passer',
    chipsLabel:'Pas d\'idée ? Pioche un type de moment', visibleCount:5, onlyIf:linkIs('couple'),
    options:[
      {v:'rencontre', label:'Notre rencontre'},{v:'voyage', label:'Un voyage'},
      {v:'epreuve', label:'Une épreuve traversée'},{v:'rire', label:'Un fou rire'},
      {v:'simple', label:'Un moment tout simple'},{v:'declaration', label:'La déclaration'},
      {v:'demenagement', label:'Notre emménagement'},{v:'malade', label:'Un moment où tu m\'as soutenu(e)'},
      {v:'famille', label:'Un souvenir en famille'},{v:'quotidien', label:'Un petit rituel à nous'},
      {v:'surprise', label:'Une surprise inoubliable'},{v:'distance', label:'Une séparation, puis les retrouvailles'},
    ] },
  { key:'motacode', eyebrow:'Facultatif, mais précieux',
    title:'Un mot à vous, une <em>expression</em> que vous seuls comprenez ?',
    sub:'Si tu en as une, c\'est souvent elle qui fait pleurer de rire ou de joie.',
    type:'text', placeholder:'Ex : "Choupinou", "on fait la paix"...', onlyIf:linkIs('couple') },

  /* ============================================================
     PARCOURS 2 — ENFANT  (linkType = enfant)
  ============================================================ */
  { key:'e_nom', eyebrow:'On plante le décor',
    title:'On <em>l\'appelle</em> comment dans la chanson ?',
    sub:'Son prénom, ou le petit surnom que tu es seul(e) à lui donner.',
    type:'text', placeholder:'Ex : Lina, mon petit lion, Nino...', onlyIf:linkIs('enfant') },
  { key:'e_age', eyebrow:'On plante le décor',
    title:'Il/elle a <em>quel âge</em> ?', sub:'Ça nous aide à trouver le bon ton, les bons mots.',
    type:'chips-single', onlyIf:linkIs('enfant'),
    options:[
      {v:'bebe', label:'Un tout-petit'},
      {v:'enfance', label:'En pleine enfance'},
      {v:'ado', label:'Un(e) ado'},
      {v:'adulte', label:'Déjà grand(e)'},

  { key:'e_occasion', eyebrow:'Le contexte',

  { key:'e_souvenir', eyebrow:'Le cœur de la chanson',
    title:'Un moment avec lui/elle que tu <em>n\'oublieras jamais</em>.',
    sub:'Un lieu, un objet, une phrase qu\'il/elle a dite... les petits détails précis sont ceux qui font sourire. Raconte simplement.',

    placeholder:'Ex : le jour où il a couru vers moi en criant mon nom pour la première fois',
    chipsLabel:'Pour t\'inspirer', visibleCount:5, onlyIf:linkIs('enfant'),
    options:[
      {v:'premier', label:'Une grande première'},
      {v:'betise', label:'Une bêtise mémorable'},
      {v:'calin', label:'Un câlin qui répare tout'},
      {v:'phrase', label:'Une phrase qu\'il/elle a dite'},
      {v:'rituel', label:'Notre petit rituel du soir'},
      {v:'jeu', label:'Un jeu qu\'on adore'},
      {v:'fierte', label:'Un moment où j\'étais si fier(e)'},
      {v:'nuit', label:'Les nuits où je le/la veillais'},
    ] },
  { key:'e_souhait', eyebrow:'Ce que tu lui transmets',
    title:'Qu\'est-ce que tu veux qu\'il/elle <em>garde</em> de cette chanson ?',

    type:'text', placeholder:'Ex : que quoi qu\'il arrive, je serai toujours là',
    onlyIf:linkIs('enfant') },

  /* ============================================================
     PARCOURS 3 — MÈRE / PÈRE  (linkType = parent)
  ============================================================ */

    title:'C\'est pour ta <em>mère</em> ou ton <em>père</em> ?', sub:'',
    type:'chips-single', onlyIf:linkIs('parent'),
    options:[

      {v:'deux', label:'Les deux'},{v:'figure', label:'Celui/celle qui m\'a élevé(e)'},

  { key:'p_nom', eyebrow:'On plante le décor',
    title:'On <em>l\'appelle</em> comment dans la chanson ?',
    sub:'Maman, Papa, son prénom, un surnom de famille... comme dans la vraie vie.',
    type:'text', placeholder:'Ex : Maman, Papa, Mamou...', onlyIf:linkIs('parent') },
  { key:'p_souvenir', eyebrow:'Le cœur de la chanson',
    title:'Un souvenir d\'enfance qui te <em>revient</em> quand tu penses à elle/lui.',
    sub:'Une odeur, un objet, un geste, une phrase qu\'elle/il répétait... les détails précis touchent le plus.',

    placeholder:'Ex : ses mains dans mes cheveux quand j\'étais malade',
    chipsLabel:'Pour t\'inspirer', visibleCount:5, onlyIf:linkIs('parent'),
    options:[
      {v:'cuisine', label:'Un plat qu\'elle/il préparait'},
      {v:'sacrifice', label:'Un sacrifice qu\'elle/il a fait pour moi'},
      {v:'lecon', label:'Une leçon de vie'},
      {v:'rituel', label:'Un rituel du quotidien'},
      {v:'soutien', label:'Un moment de soutien'},
      {v:'fierte', label:'Le jour où je l\'ai rendu(e) fier(e)'},
      {v:'voyage', label:'Un voyage, des vacances'},
      {v:'phrase', label:'Une phrase qu\'elle/il répétait'},
    ] },
  { key:'p_merci', eyebrow:'Ce que tu veux dire',
    title:'S\'il y avait <em>une chose</em> à lui dire merci, ce serait quoi ?',
    sub:'Ce qu\'on ne dit pas toujours à voix haute.',
    type:'text', placeholder:'Ex : de m\'avoir toujours laissé libre de mes choix',

  { key:'p_emotion_ctx', eyebrow:'Le contexte',
    title:'C\'est pour une <em>occasion</em> ?', sub:'',
    type:'chips-single', onlyIf:linkIs('parent'),
    options:[

      {v:'hommage', label:'Un hommage, elle/il nous manque'},
      {v:'justecomeca', label:'Juste pour lui dire merci'},

  /* ============================================================
     PARCOURS 4 — FRÈRE / SŒUR  (linkType = fratrie)
  ============================================================ */
  { key:'f_nom', eyebrow:'On plante le décor',
    title:'On <em>l\'appelle</em> comment dans la chanson ?',
    sub:'Son prénom, ou le surnom que vous utilisez entre vous.',
    type:'text', placeholder:'Ex : mon frérot, Léa, le boss...', onlyIf:linkIs('fratrie') },
  { key:'f_complicite', eyebrow:'Votre lien',
    title:'Vous êtes plutôt <em>comment</em>, tous les deux ?', sub:'',
    type:'chips-single', onlyIf:linkIs('fratrie'),

      {v:'inseparables', label:'Inséparables depuis toujours'},

      {v:'distance', label:'Loin des yeux, près du cœur'},
      {v:'retrouves', label:'On s\'est rapprochés avec le temps'},
    ] },
  { key:'f_souvenir', eyebrow:'Le cœur de la chanson',
    title:'Un souvenir d\'enfance <em>rien qu\'à vous deux</em>.',
    sub:'Un lieu, un objet, une phrase à vous... les bêtises, les secrets. Plus c\'est précis, plus ça touche. Raconte comme ça vient.',
    type:'text-with-chips',

function activeSteps(){ return steps.filter(s => !s.onlyIf || s.onlyIf()); }

function renderTrace(){
  const list = activeSteps();
  const el = document.getElementById('trace'); el.innerHTML='';
  list.forEach((s,i)=>{
    const dot = document.createElement('i');
    if(i < state.index) dot.className='done';
    else if(i === state.index) dot.className='now';
    el.appendChild(dot);
  });
}
function renderWaveform(){
  const list = activeSteps();
  const el = document.getElementById('waveform'); el.innerHTML='';
  const heights=[10,22,14,30,18,26,12,20,16,28,14,22,10,18,24,12];
  list.forEach((s,i)=>{
    const bar=document.createElement('span');
    const h=heights[i%heights.length];
    bar.style.height=(state.index>=i?h:5)+'px';
    if(state.index>=i) bar.classList.add('on');
    el.appendChild(bar);
  });
}
function renderStage(){
  const list = activeSteps();
  if(state.index >= list.length){ renderRecap(); return; }
  const s = list[state.index];
  const stage = document.getElementById('stage');
  document.getElementById('catLabel').textContent = (state.linkType==='autre' && state.answers.link_libre) ? state.answers.link_libre : (catLabels[state.linkType] || 'Ta chanson');

  let bodyHTML='';
  const vc = s.visibleCount || (s.options?s.options.length:0);
  const hasMore = s.options && s.options.length > vc;
  const showAll = !!state._expanded;

  function chipList(opts, extraClass){
    const l = showAll?opts:opts.slice(0,vc);
    return l.map(o=>{
      const sel = s.type==='chips-multi'
        ? (state.answers[s.key]||[]).includes(o.v)
        : state.answers[s.key]===o.v;
      return `<div class="chip ${sel?'sel':''} ${extraClass||''}" data-v="${o.v}" ${o.label?`data-fill="${o.label}"`:''}>${o.ic?`<span class="ic">${o.ic}</span>`:''}${o.label}</div>`;
    }).join('');
  }
  const moreBtnHTML = hasMore ? `<div class="more-btn ${showAll?'open':''}" id="moreBtn">${showAll?'Moins de suggestions':'Voir d\'autres suggestions'} <span class="spin">⌄</span></div>` : '';

  if(s.type==='chips-single'){
    const freePlaceholder = (s.key==='link') ? 'Une autre personne ? Dis-moi qui (ex : ma belle-mère...)' : 'Aucune ne colle ? Écris-le toi-même ici';
    const freeField = `<div class="also-field"><textarea class="field" id="freeArea" rows="1" placeholder="${freePlaceholder}">${state.answers[s.key+'_libre']||''}</textarea></div>`;
    bodyHTML=`<div class="chips" id="chipsArea">${chipList(s.options)}</div>${moreBtnHTML}${freeField}`;
  }
  if(s.type==='text'){ bodyHTML=`<textarea class="field" id="textArea" rows="3" placeholder="${s.placeholder||''}">${state.answers[s.key]||''}</textarea>`; }
  if(s.type==='text-with-chips'){
    bodyHTML=`<textarea class="field" id="textArea" rows="3" placeholder="${s.placeholder||''}">${state.answers[s.key]||''}</textarea>
      <div class="chips-secondary"><div class="label">${s.chipsLabel}</div>
      <div class="chips" id="chipsArea">${chipList(s.options)}</div>${moreBtnHTML}</div>`;
  }
  if(s.type==='chips-multi'){
    bodyHTML=`<div class="chips" id="chipsArea">${chipList(s.options)}</div>${moreBtnHTML}
      ${s.allowCustom?`<div class="also-field"><textarea class="field" id="customArea" rows="1" placeholder="Un autre mot ? (facultatif)">${state.answers[s.key+'_custom']||''}</textarea></div>`:''}`;
  }

  stage.innerHTML=`
    <div class="q-wrap">
      <div class="q-eyebrow">${s.eyebrow}</div>
      <h1 class="q-title">${s.title}</h1>
      ${s.sub?`<p class="q-sub">${s.sub}</p>`:''}
      ${bodyHTML}
    </div>
    <div class="controls">
      <button class="btn-back" id="backBtn" ${state.index===0?'disabled':''}>‹</button>
      <button class="btn-next" id="nextBtn">Continuer</button>
    </div>`;

  if(s.type==='chips-single'){
    stage.querySelectorAll('.chip').forEach(chip=>chip.addEventListener('click',()=>{
      state.answers[s.key]=chip.dataset.v;
      state.answers[s.key+'_libre']='';   // choisir une chip efface la réponse libre (c'est OU)
      if(s.key==='link') state.linkType=chip.dataset.v;
      renderStage();
    }));
  }
  if(s.type==='chips-multi'){
    const current=new Set(state.answers[s.key]||[]);
    stage.querySelectorAll('.chip').forEach(chip=>chip.addEventListener('click',()=>{
      const v=chip.dataset.v;
      if(current.has(v)) current.delete(v);
      else { if(current.size>=s.max) return; current.add(v); }
      state.answers[s.key]=Array.from(current);
      renderStage();
    }));
  }
  if(s.type==='text-with-chips'){
    stage.querySelectorAll('.chip').forEach(chip=>chip.addEventListener('click',()=>{
      const ta=document.getElementById('textArea');
      ta.value=chip.dataset.fill+' — '; ta.focus();
    }));
  }
  const moreBtn=document.getElementById('moreBtn');
  if(moreBtn) moreBtn.addEventListener('click',()=>{
    const ta=document.getElementById('textArea');
    if(ta) state.answers[s.key]=ta.value;
    state._expanded=!state._expanded; renderStage();
  });
  document.getElementById('nextBtn').addEventListener('click',()=>goNext(s));
  const backBtn=document.getElementById('backBtn');
  if(backBtn) backBtn.addEventListener('click',goBack);

  renderTrace(); renderWaveform();
}
function goNext(s){
  if(s.type==='text'||s.type==='text-with-chips'){ state.answers[s.key]=document.getElementById('textArea').value; }
  if(s.type==='chips-single'){
    const fa=document.getElementById('freeArea');
    if(fa){
      const libre=fa.value.trim();
      state.answers[s.key+'_libre']=libre;
      if(libre){
        state.answers[s.key]='';
        if(s.key==='link'){ state.linkType='autre'; }   // lien écrit librement → parcours universel
      } else if(s.key==='link' && !state.linkType){
        return; // sur la 1re question, il faut au moins un choix ou un texte
      }
    }
  }
  if(s.type==='chips-multi'&&s.allowCustom){ state.answers[s.key+'_custom']=document.getElementById('customArea').value; }
  state.index++; state._expanded=false; renderStage(); window.scrollTo(0,0);
}
function goBack(){ state.index=Math.max(0,state.index-1); state._expanded=false; renderStage(); }
// Construit les lignes du récap (réutilisé pour l'affichage ET le message envoyé)
function recapRows(){
  const a=state.answers;
  const recapKeys = {
    nom:'On l\'appelle', duree:'Ensemble depuis', enfants_details:'Leurs enfants', souvenir:'Le souvenir', motacode:'Leur mot à eux',
    e_nom:'On l\'appelle', e_age:'Son âge', e_occasion:'L\'occasion', e_souvenir:'Le souvenir', e_souhait:'Ce que je veux transmettre',
    p_qui:'Pour', p_nom:'On l\'appelle', p_souvenir:'Le souvenir', p_merci:'Le merci', p_emotion_ctx:'L\'occasion',
    f_nom:'On l\'appelle', f_complicite:'Votre lien', f_souvenir:'Le souvenir', f_merci:'Ce que je lui dois',
    g_qui:'Pour', g_nom:'On l\'appelle', g_souvenir:'Le souvenir', g_merci:'Ce que je veux lui dire', g_occasion:'L\'occasion',
    a_nom:'On l\'appelle', a_depuis:'On se connaît depuis', a_souvenir:'Le souvenir', a_merci:'Pourquoi c\'est précieux', a_occasion:'L\'occasion',
    u_nom:'On l\'appelle', u_souvenir:'Le souvenir', u_merci:'Ce que je veux lui dire',
    musique:'Ce qu\'elle/il écoute', coeur:'À retenir avant tout', eviter:'À éviter',
  };
  function labelFor(key, val){
    const step = steps.find(s=>s.key===key);
    if(step && step.options){
      const opt = step.options.find(o=>o.v===val);
      if(opt) return opt.label;
    }
    return val;
  }
  const rows = [];
  if(state.linkType==='autre' && a.link_libre){ rows.push(['Pour', a.link_libre]); }
  activeSteps().forEach(s=>{
    if(s.key==='link') return;
    const libre = a[s.key+'_libre'];
    const val = a[s.key];
    let display;
    if(libre && libre.trim()!==''){ display = libre; }
    else if(val!==undefined && val!==''){ display = (s.type==='chips-single') ? labelFor(s.key,val) : val; }
    else return;
    if(recapKeys[s.key]){ rows.push([recapKeys[s.key], display]); }
  });
  if(a.traits && a.traits.length) rows.push(['3 mots pour elle/lui', a.traits.map(v=>labelFor('traits',v)).join(', ')+(a.traits_custom?', '+a.traits_custom:'')]);
  return rows;
}

function renderRecap(){
  const stage=document.getElementById('stage'); const a=state.answers;
  document.getElementById('trace').innerHTML='';
  document.getElementById('waveform').querySelectorAll('span').forEach(s=>s.classList.add('on'));
  const rows = recapRows();
  stage.innerHTML=`
    <div class="recap">
      <div class="recap-icon">🎵</div>
      <h1 class="q-title">C\'est noté.<br><em>On compose sa chanson.</em></h1>
      <p class="q-sub">On a tout ce qu\'il faut pour lui écrire une chanson qui sonne vraiment comme elle/lui. Dernière étape : laisse-nous ton email pour la recevoir.</p>
      <div class="recap-card">
        ${rows.map(([k,v])=>`<div class="recap-row"><div class="recap-k">${k}</div><div class="recap-v">${v||'—'}</div></div>`).join('')}
      </div>
      <div class="final-actions">
        <label class="qlabel" for="f_email">Ton email <span class="req">*</span></label>
        <input class="field" id="f_email" type="email" inputmode="email" autocomplete="email" placeholder="ton@email.com" value="${a.email||''}">
        <label class="qlabel" for="f_email2">Confirme ton email <span class="req">*</span></label>
        <input class="field" id="f_email2" type="email" inputmode="email" autocomplete="email" placeholder="ton@email.com" value="${a.email_confirm||''}">
        <div class="formerr" id="formerr"></div>
      </div>
      <div class="controls">
        <button class="btn-back" id="backBtn">‹</button>
        <button class="btn-next" id="sendBtn">Envoyer et choisir ma formule</button>
      </div>
    </div>`;
  document.getElementById('backBtn').addEventListener('click',()=>{ state.index=Math.max(0,activeSteps().length-1); state._expanded=false; renderStage(); });
  document.getElementById('sendBtn').addEventListener('click',submitFinal);
}

function buildMessage(){
  const lines=[];
  const pour=(state.linkType==='autre'&&state.answers.link_libre)?state.answers.link_libre:(catLabels[state.linkType]||'—');
  lines.push('Pour : '+pour);
  recapRows().forEach(([k,v])=>{ if(k!=='Pour' && v) lines.push(k+' : '+v); });
  lines.push('');
  lines.push('Email : '+(state.answers.email||''));
  return lines.join('\n');
}

function submitFinal(){
  const email=(document.getElementById('f_email').value||'').trim();
  const confirm=(document.getElementById('f_email2').value||'').trim();
  if(!isValidEmail(email)){ showFormError("Cet email ne semble pas valide (il faut un @ et un domaine)."); return; }
  if(email!==confirm){ showFormError('Les deux emails ne correspondent pas.'); return; }
  state.answers.email=email; state.answers.email_confirm=confirm; showFormError('');
  if(!window.emailjs){ showFormError("Service d'envoi indisponible pour le moment. Réessaie dans un instant."); return; }
  const btn=document.getElementById('sendBtn'); const old=btn.textContent;
  btn.disabled=true; btn.textContent='Envoi en cours...';
  const name=state.answers.nom||state.answers.e_nom||state.answers.p_nom||state.answers.f_nom||state.answers.g_nom||state.answers.a_nom||state.answers.u_nom||'Client';
  const params={ name:name, email:email, message:buildMessage() };
  emailjs.send(EMAILJS_SERVICE_ID,EMAILJS_TEMPLATE_ID,params)
    .then(()=>{ renderPricing(); })
    .catch(err=>{ console.error('EmailJS error',err); btn.disabled=false; btn.textContent=old; showFormError("L'envoi a échoué. Vérifie ta connexion et réessaie — tes réponses sont conservées."); });
}

// Présélection du parcours via ?cat= (boutons « Pour qui » de la page de vente).
// Valeurs valides = celles des options de la 1re question : couple, enfant, parent, fratrie, grandparent, ami.
// Si fourni, on saute la question « Pour qui » et on démarre à la 1re question du parcours.
function initCat(){
  const cat = new URLSearchParams(location.search).get('cat');
  if(!cat) return;
  const linkStep = steps.find(s=>s.key==='link');
  const valid = (linkStep && linkStep.options ? linkStep.options.map(o=>o.v) : []);
  if(valid.includes(cat)){
    state.linkType = cat;
    state.answers.link = cat;
    state.index = 1; // 0 = « Pour qui » (présélectionnée) → 1 = 1re question du parcours
  }
}
